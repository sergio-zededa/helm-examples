apiVersion: v1
kind: Service
metadata:
  name: {{ include "train-detection.inference.fullname" . }}
  labels:
    {{- include "train-detection.labels" . | nindent 4 }}
    app.kubernetes.io/component: inference
spec:
  type: {{ .Values.inference.service.type }}
  selector:
    {{- include "train-detection.inference.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.inference.service.port }}
      targetPort: http
      {{- if eq .Values.inference.service.type "NodePort" }}
      nodePort: {{ .Values.inference.service.port }}
      {{- end }}
