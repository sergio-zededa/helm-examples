{{- if .Values.hooks.preUpgrade.enabled }}
# ── Pre-upgrade hook: Job ─────────────────────────────────────────────────────
# Deletes the inference Deployment before each upgrade so Kubernetes can
# recreate it cleanly (spec.selector is immutable once set).
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "train-detection.preupgrade.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "train-detection.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "helm.sh/hook-weight": "0"
spec:
  backoffLimit: 2
  template:
    spec:
      serviceAccountName: {{ include "train-detection.hook.name" . }}
      restartPolicy: Never
      containers:
        - name: delete-deployments
          image: {{ .Values.hooks.preUpgrade.image | quote }}
          command:
            - /bin/sh
            - -c
            - |
              echo "Deleting inference deployment..."
              kubectl delete deployment \
                {{ include "train-detection.inference.fullname" . }} \
                --namespace {{ .Release.Namespace }} \
                --ignore-not-found=true
              echo "Done."
{{- end }}
