apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "train-detection.inference.fullname" . }}
  labels:
    {{- include "train-detection.labels" . | nindent 4 }}
    app.kubernetes.io/component: inference
spec:
  replicas: {{ .Values.inference.replicaCount }}
  selector:
    matchLabels:
      {{- include "train-detection.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: inference
  template:
    metadata:
      labels:
        {{- include "train-detection.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: inference
        train-detection/variant: {{ .Values.inference.variant }}
    spec:
      {{- with .Values.inference.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: inference
          image: "{{ .Values.inference.image.repository }}:{{ include "train-detection.inference.imageTag" . }}"
          imagePullPolicy: {{ .Values.inference.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.inference.service.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.inference.service.port | quote }}
            - name: WEBHOOK_URL
              value: {{ include "train-detection.webhookUrl" . | quote }}
            - name: MODEL_PATH
              value: {{ .Values.inference.config.modelPath | quote }}
            - name: ROI_PROFILE
              value: {{ .Values.inference.config.roiProfile | quote }}
            - name: SEND_EVERY_N_FRAMES
              value: {{ .Values.inference.config.sendEveryNFrames | quote }}
            - name: ENABLE_PEOPLE_DETECTION
              value: {{ include "train-detection.inference.enablePeople" . | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.inference.resources | nindent 12 }}
